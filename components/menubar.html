    <header class="menu-bar" id="menu-bar">
      <div class="menu-bar-left">
        <!-- Apple Logo -->
        <button class="menu-bar-item apple-logo" id="apple-menu-btn" aria-label="Apple Menu">
          <svg viewBox="0 0 17 20" width="14" height="17" fill="currentColor">
            <path d="M15.5 14.7c-.4.9-.6 1.3-1.1 2.1-.7 1.1-1.7 2.4-2.9 2.4-1.1.1-1.4-.7-2.9-.7s-1.9.7-3 .7c-1.2 0-2.1-1.2-2.8-2.3C1.2 14.5.5 11.4 1.7 9.3c.8-1.5 2.3-2.4 3.8-2.4 1.4 0 2.3.8 3.4.8 1.1 0 1.8-.8 3.3-.8 1.4 0 2.6.7 3.4 2-.1.1-2 1.2-2 3.5.1 2.7 2.4 3.6 2.4 3.6-.1.2-.4 1.2-.5 1.6zM11.3 1c.6-.7 1-1.7 .9-2.7-.9.1-2 .6-2.6 1.4-.6.7-1.1 1.7-.9 2.7 1 0 2-.6 2.6-1.4z" transform="translate(0,3)"/>
          </svg>
        </button>
        <button class="menu-bar-item menu-bar-app-name">Finder</button>
        <button class="menu-bar-item">File</button>
        <button class="menu-bar-item">Edit</button>
        <button class="menu-bar-item">View</button>
        <button class="menu-bar-item">Go</button>
        <button class="menu-bar-item">Window</button>
        <button class="menu-bar-item">Help</button>
      </div>

      <div class="menu-bar-right">
        <!-- Focus mode (moon) -->
        <button class="menu-bar-icon" aria-label="Focus">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor">
            <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
          </svg>
        </button>

        <!-- Username -->
        <button class="menu-bar-item menu-bar-username">Lorenzo</button>

        <!-- Wi-Fi icon -->
        <button class="menu-bar-icon" aria-label="Wi-Fi">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1.4 8.6a16 16 0 0 1 21.2 0"/>
            <path d="M5.6 12.4a10 10 0 0 1 12.8 0"/>
            <path d="M9.2 16.2a5 5 0 0 1 5.6 0"/>
            <circle cx="12" cy="20" r="1" fill="currentColor" stroke="none"/>
          </svg>
        </button>

        <!-- Battery icon with percentage -->
        <button class="menu-bar-icon menu-bar-battery" aria-label="Battery">
          <span class="menu-bar-battery-pct">87%</span>
          <svg viewBox="0 0 28 14" width="22" height="11" fill="none">
            <rect x="0.5" y="0.5" width="23" height="13" rx="2.5" stroke="currentColor" stroke-width="1"/>
            <rect x="24.5" y="4" width="2.5" height="6" rx="1" fill="currentColor" opacity="0.4"/>
            <rect x="2" y="2" width="18" height="10" rx="1.5" fill="currentColor" opacity="0.8"/>
          </svg>
        </button>

        <!-- Spotlight (magnifying glass) -->
        <button class="menu-bar-icon" id="spotlight-btn" aria-label="Spotlight">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/>
            <line x1="16.5" y1="16.5" x2="21" y2="21"/>
          </svg>
        </button>

        <!-- Control Center icon (two toggles) -->
        <button class="menu-bar-icon" id="control-center-btn" aria-label="Control Center">
          <svg viewBox="0 0 18 18" width="15" height="15" fill="currentColor">
            <rect x="2" y="3" width="14" height="2.5" rx="1.25"/>
            <circle cx="6" cy="4.25" r="2.5"/>
            <rect x="2" y="8" width="14" height="2.5" rx="1.25"/>
            <circle cx="12" cy="9.25" r="2.5"/>
            <rect x="2" y="13" width="14" height="2.5" rx="1.25"/>
            <circle cx="8" cy="14.25" r="2.5"/>
          </svg>
        </button>

        <!-- Date/Time -->
        <button class="menu-bar-item menu-bar-datetime" id="menu-bar-datetime">
          <span id="menu-bar-date-text">Mon Sep 9</span>
          <span id="menu-bar-time-text">11:15 AM</span>
        </button>
      </div>
    </header>
