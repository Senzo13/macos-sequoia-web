<div class="window" id="window-maps" data-app="maps" style="display:none; width:800px; height:500px; top:50px; left:120px;">
  <div class="window-titlebar" data-drag="true">
    <div class="traffic-lights">
      <button class="traffic-light btn-close" data-action="close" aria-label="Close"></button>
      <button class="traffic-light btn-minimize" data-action="minimize" aria-label="Minimize"></button>
      <button class="traffic-light btn-maximize" data-action="maximize" aria-label="Maximize"></button>
    </div>
    <div class="window-title"><span>Maps</span></div>
  </div>
  <div class="window-body maps-body" style="position:relative;padding:0;overflow:hidden;">
    <!-- Map Background with Grid Pattern -->
    <div class="maps-canvas" style="position:absolute;inset:0;background:#2d3436;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:40px 40px;">
      <!-- Simulated Roads -->
      <svg style="position:absolute;inset:0;width:100%;height:100%;" viewBox="0 0 800 460" preserveAspectRatio="none">
        <!-- Major roads -->
        <line x1="0" y1="230" x2="800" y2="230" stroke="#4a5568" stroke-width="4"/>
        <line x1="400" y1="0" x2="400" y2="460" stroke="#4a5568" stroke-width="4"/>
        <line x1="0" y1="120" x2="800" y2="120" stroke="#3d4451" stroke-width="2"/>
        <line x1="0" y1="340" x2="800" y2="340" stroke="#3d4451" stroke-width="2"/>
        <line x1="200" y1="0" x2="200" y2="460" stroke="#3d4451" stroke-width="2"/>
        <line x1="600" y1="0" x2="600" y2="460" stroke="#3d4451" stroke-width="2"/>
        <!-- Diagonal road -->
        <line x1="100" y1="0" x2="500" y2="460" stroke="#3d4451" stroke-width="2"/>
        <!-- Water area -->
        <ellipse cx="620" cy="350" rx="120" ry="80" fill="#1a3a4a" opacity="0.6"/>
        <!-- Parks -->
        <rect x="140" y="260" width="80" height="60" rx="8" fill="#1a3a2a" opacity="0.5"/>
        <rect x="500" y="80" width="60" height="50" rx="6" fill="#1a3a2a" opacity="0.5"/>
        <!-- Location pin -->
        <g transform="translate(400,215)">
          <circle cx="0" cy="0" r="14" fill="#007AFF" opacity="0.2"/>
          <circle cx="0" cy="0" r="7" fill="#007AFF"/>
          <circle cx="0" cy="0" r="3" fill="#fff"/>
        </g>
      </svg>
    </div>

    <!-- Search Bar -->
    <div class="maps-search-container" style="position:absolute;top:12px;left:12px;z-index:2;">
      <div class="maps-search-bar" style="display:flex;align-items:center;gap:6px;background:rgba(30,30,30,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 14px;width:260px;">
        <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="12.5" y1="12.5" x2="17" y2="17"/></svg>
        <input type="text" class="maps-search-input" placeholder="Search Maps" disabled style="background:transparent;border:none;outline:none;color:#fff;font-size:13px;width:100%;">
      </div>
    </div>

    <!-- Zoom Controls -->
    <div class="maps-zoom-controls" style="position:absolute;top:12px;right:12px;z-index:2;display:flex;flex-direction:column;gap:1px;">
      <button class="maps-ctrl-btn" aria-label="Zoom in" style="width:36px;height:36px;background:rgba(30,30,30,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:8px 8px 0 0;cursor:pointer;display:flex;align-items:center;justify-content:center;">
        <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><line x1="10" y1="5" x2="10" y2="15"/><line x1="5" y1="10" x2="15" y2="10"/></svg>
      </button>
      <button class="maps-ctrl-btn" aria-label="Zoom out" style="width:36px;height:36px;background:rgba(30,30,30,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:0 0 8px 8px;cursor:pointer;display:flex;align-items:center;justify-content:center;">
        <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><line x1="5" y1="10" x2="15" y2="10"/></svg>
      </button>
    </div>

    <!-- Location Button -->
    <div style="position:absolute;top:96px;right:12px;z-index:2;">
      <button class="maps-ctrl-btn" aria-label="Current location" style="width:36px;height:36px;background:rgba(30,30,30,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;">
        <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="#007AFF" stroke-width="1.8" stroke-linecap="round"><circle cx="10" cy="10" r="4"/><path d="M10 2v3M10 15v3M2 10h3M15 10h3"/></svg>
      </button>
    </div>

    <!-- Compass -->
    <div style="position:absolute;top:144px;right:12px;z-index:2;">
      <button class="maps-ctrl-btn" aria-label="Compass" style="width:36px;height:36px;background:rgba(30,30,30,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;">
        <svg viewBox="0 0 20 20" width="16" height="16"><polygon points="10,3 12,9 10,8 8,9" fill="#ff3b30"/><polygon points="10,17 8,11 10,12 12,11" fill="#fff"/></svg>
      </button>
    </div>

    <!-- Bottom Mode Bar -->
    <div class="maps-bottom-bar" style="position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:2;display:flex;gap:2px;background:rgba(30,30,30,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:3px;">
      <button class="maps-mode-btn active" style="padding:6px 16px;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;background:#007AFF;color:#fff;">Explore</button>
      <button class="maps-mode-btn" style="padding:6px 16px;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:rgba(255,255,255,0.7);">Driving</button>
      <button class="maps-mode-btn" style="padding:6px 16px;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:rgba(255,255,255,0.7);">Transit</button>
      <button class="maps-mode-btn" style="padding:6px 16px;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:rgba(255,255,255,0.7);">Satellite</button>
    </div>

    <!-- Scale Indicator -->
    <div style="position:absolute;bottom:16px;left:12px;z-index:2;display:flex;align-items:center;gap:6px;">
      <div style="width:60px;height:2px;background:rgba(255,255,255,0.4);position:relative;">
        <div style="position:absolute;left:0;top:-3px;width:1px;height:8px;background:rgba(255,255,255,0.4);"></div>
        <div style="position:absolute;right:0;top:-3px;width:1px;height:8px;background:rgba(255,255,255,0.4);"></div>
      </div>
      <span style="font-size:10px;color:rgba(255,255,255,0.4);">500 m</span>
    </div>
  </div>
</div>
