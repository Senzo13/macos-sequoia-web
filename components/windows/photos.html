<div class="window" id="window-photos" data-app="photos" style="display:none; width:860px; height:560px; top:55px; left:140px;">

      <button class="traffic-light btn-close" data-action="close" aria-label="Close"></button>

      <button class="traffic-light btn-maximize" data-action="maximize" aria-label="Maximize"></button>
    </div>
    <div class="window-title"><span>Photos</span></div>
  </div>

          <li class="photos-sidebar-item active">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none"><rect x="1" y="3" width="14" height="10" rx="2" stroke="#007AFF" stroke-width="1.3"/><circle cx="5.5" cy="7" r="1.5" fill="#007AFF"/><path d="M1 11l4-3 3 2 3-4 4 3" stroke="#007AFF" stroke-width="1.2" fill="none" stroke-linejoin="round"/></svg>
            <span>Library</span>

      </div>
      <div class="photos-sidebar-section">
        <h3 class="photos-sidebar-heading" style="font-size:11px;font-weight:600;color:#8e8e93;text-transform:uppercase;padding:8px 12px 4px;letter-spacing:0.5px;">Albums</h3>
        <ul class="photos-sidebar-list">
          <li class="photos-sidebar-item">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none"><circle cx="8" cy="8" r="6" stroke="#8e8e93" stroke-width="1.3"/><circle cx="8" cy="7" r="2.5" stroke="#8e8e93" stroke-width="1.1"/><path d="M4 13c0-2.2 1.8-4 4-4s4 1.8 4 4" stroke="#8e8e93" stroke-width="1.1"/></svg>
            <span>People</span>
          </li>
          <li class="photos-sidebar-item">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none"><circle cx="8" cy="7" r="5" stroke="#8e8e93" stroke-width="1.2"/><path d="M8 12v2" stroke="#8e8e93" stroke-width="1.3" stroke-linecap="round"/><circle cx="8" cy="7" r="1.5" fill="#8e8e93"/></svg>

          </li>
          <li class="photos-sidebar-item">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none"><rect x="2" y="3" width="12" height="10" rx="2" stroke="#8e8e93" stroke-width="1.2"/><rect x="4" y="5" width="8" height="6" rx="1" stroke="#8e8e93" stroke-width="1"/></svg>

            <svg viewBox="0 0 16 16" width="14" height="14" fill="none"><rect x="3" y="2" width="10" height="12" rx="2" stroke="#8e8e93" stroke-width="1.2"/><polygon points="6.5,6 6.5,10 10.5,8" fill="#8e8e93"/></svg>
            <span>Videos</span>
          </li>
        </ul>
      </div>
    </aside>
