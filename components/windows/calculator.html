    <div class="window" id="window-calculator" data-window="calculator" style="display:none; width:252px; height:380px; top:100px; left:400px;">
      <div class="window-titlebar window-titlebar-dark" data-drag="true">
        <div class="traffic-lights">
          <button class="traffic-light traffic-close" data-action="close" aria-label="Close"></button>
          <button class="traffic-light traffic-minimize" data-action="minimize" aria-label="Minimize"></button>
          <button class="traffic-light traffic-maximize" data-action="maximize" aria-label="Maximize"></button>
        </div>
        <div class="window-title"><span>Calculator</span></div>
      </div>
      <div class="window-body calculator-body">
        <div class="calc-display" id="calc-display">0</div>
        <div class="calc-buttons">
          <button class="calc-btn calc-btn-fn" data-calc="clear">AC</button>
          <button class="calc-btn calc-btn-fn" data-calc="negate">+/-</button>
          <button class="calc-btn calc-btn-fn" data-calc="percent">%</button>
          <button class="calc-btn calc-btn-op" data-calc="/">&#247;</button>

          <button class="calc-btn calc-btn-num" data-calc="7">7</button>
          <button class="calc-btn calc-btn-num" data-calc="8">8</button>
          <button class="calc-btn calc-btn-num" data-calc="9">9</button>
          <button class="calc-btn calc-btn-op" data-calc="*">&times;</button>

          <button class="calc-btn calc-btn-num" data-calc="4">4</button>
          <button class="calc-btn calc-btn-num" data-calc="5">5</button>
          <button class="calc-btn calc-btn-num" data-calc="6">6</button>
          <button class="calc-btn calc-btn-op" data-calc="-">&minus;</button>

          <button class="calc-btn calc-btn-num" data-calc="1">1</button>
          <button class="calc-btn calc-btn-num" data-calc="2">2</button>
          <button class="calc-btn calc-btn-num" data-calc="3">3</button>
          <button class="calc-btn calc-btn-op" data-calc="+">+</button>

          <button class="calc-btn calc-btn-num calc-btn-zero" data-calc="0">0</button>
          <button class="calc-btn calc-btn-num" data-calc=".">.</button>
          <button class="calc-btn calc-btn-op" data-calc="=">=</button>
        </div>
      </div>
    </div>
