<div class="window" id="window-safari" data-app="safari" style="display:none; width:1024px; height:680px; top:50px; left:150px;">
  <div class="window-titlebar" data-drag="true">
    <div class="traffic-lights">
      <button class="traffic-light btn-close" data-action="close" aria-label="Close"></button>
      <button class="traffic-light btn-minimize" data-action="minimize" aria-label="Minimize"></button>
      <button class="traffic-light btn-maximize" data-action="maximize" aria-label="Maximize"></button>
    </div>
    <div class="window-title"><span>Safari</span></div>
  </div>
  <div class="window-body safari-body" style="padding:0;overflow:hidden;display:flex;flex-direction:column;">
    <!-- Safari Toolbar -->
    <div class="safari-toolbar" style="display:flex;align-items:center;gap:8px;padding:6px 12px;background:linear-gradient(to bottom,#f6f6f6,#e8e8e8);border-bottom:1px solid #c8c8c8;flex-shrink:0;">
      <button class="safari-nav-btn" aria-label="Back" style="background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;">
        <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="13,4 7,10 13,16"/></svg>
      </button>
      <button class="safari-nav-btn" aria-label="Forward" style="background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;">
        <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"><polyline points="7,4 13,10 7,16"/></svg>
      </button>
      <div class="safari-url-bar" style="flex:1;max-width:560px;margin:0 auto;display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #c8c8c8;border-radius:8px;padding:5px 12px;font-size:13px;">
        <svg viewBox="0 0 16 16" width="12" height="12" fill="#34c759" style="flex-shrink:0;"><path d="M8 1a5 5 0 0 0-5 5v1H2.5A1.5 1.5 0 0 0 1 8.5v5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-5A1.5 1.5 0 0 0 13.5 7H13V6a5 5 0 0 0-5-5zm0 1.5A3.5 3.5 0 0 1 11.5 6v1h-7V6A3.5 3.5 0 0 1 8 2.5z"/></svg>
        <span class="safari-url-text" style="color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">github.com/Senzo13</span>
      </div>
      <button class="safari-share-btn" aria-label="Share" style="background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;">
        <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="#333" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v10"/><polyline points="6,6 10,2 14,6"/><path d="M4 10v7a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-7"/></svg>
      </button>
      <button class="safari-tabs-btn" aria-label="Tabs" style="background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;">
        <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="#333" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="4" width="10" height="8" rx="1.5"/><rect x="8" y="8" width="10" height="8" rx="1.5"/></svg>
      </button>
    </div>
    <!-- Safari Content -->
    <iframe src="https://github.com/Senzo13" class="safari-iframe" style="width:100%;height:100%;border:none;flex:1;" sandbox="allow-scripts allow-same-origin allow-popups allow-forms" loading="lazy"></iframe>
  </div>
</div>
